<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accordion</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Мини-проект: Accordion</h1>
      <section class="accordion">
        <div class="accordion-item">
          <button class="accordion-button">Что такое HTML?</button>
          <div class="accordion-content">
            <p>HTML — это язык разметки, который задаёт структуру страницы.</p>
          </div>
        </div>
        <div class="accordion-item">
          <button class="accordion-button">Что такое CSS?</button>
          <div class="accordion-content">
            <p>
              CSS отвечает за внешний вид страницы: цвета, отступы, размеры и
              расположение элементов.
            </p>
          </div>
        </div>
        <div class="accordion-item">
          <button class="accordion-button">Что такое JavaScript?</button>
          <div class="accordion-content">
            <p>
              JavaScript добавляет интерактивность: клики, открытие окон,
              изменение элементов на странице.
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
